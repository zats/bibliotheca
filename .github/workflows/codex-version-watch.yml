name: Codex version watch

on:
  workflow_dispatch:
  schedule:
    - cron: "7/5 * * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: codex-version-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Sparkle feed
        id: feed
        run: |
          python3 <<'PY'
          import email.utils
          import os
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone

          feed_url = "https://persistent.oaistatic.com/codex-app-prod/appcast.xml"
          with urllib.request.urlopen(feed_url, timeout=30) as response:
              xml = response.read()

          root = ET.fromstring(xml)
          item = root.find("./channel/item")
          if item is None:
              raise SystemExit("Sparkle feed has no items")

          enclosure = item.find("enclosure")
          if enclosure is None:
              raise SystemExit("Latest Sparkle item has no enclosure")

          version = (item.findtext("title") or "").strip()
          published_raw = (item.findtext("pubDate") or "").strip()
          download_url = enclosure.attrib.get("url", "").strip()

          if not version or not published_raw or not download_url:
              raise SystemExit("Latest Sparkle item is missing title, pubDate, or enclosure url")

          detected_at = datetime.now(timezone.utc)
          published_at = email.utils.parsedate_to_datetime(published_raw).astimezone(timezone.utc)
          detection_lag_seconds = int((detected_at - published_at).total_seconds())

          outputs = {
              "feed_url": feed_url,
              "version": version,
              "published_raw": published_raw,
              "published_at": published_at.isoformat(timespec="seconds").replace("+00:00", "Z"),
              "detected_at": detected_at.isoformat(timespec="seconds").replace("+00:00", "Z"),
              "detection_lag_seconds": str(detection_lag_seconds),
              "download_url": download_url,
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in outputs.items():
                  print(f"{key}={value}", file=output)
          PY

      - name: Open issue for new version
        env:
          GH_TOKEN: ${{ github.token }}
          STATE_FILE: .github/codex-version-watch-state.json
          VERSION: ${{ steps.feed.outputs.version }}
          PUBLISHED_RAW: ${{ steps.feed.outputs.published_raw }}
          PUBLISHED_AT: ${{ steps.feed.outputs.published_at }}
          DETECTED_AT: ${{ steps.feed.outputs.detected_at }}
          DETECTION_LAG_SECONDS: ${{ steps.feed.outputs.detection_lag_seconds }}
          DOWNLOAD_URL: ${{ steps.feed.outputs.download_url }}
          FEED_URL: ${{ steps.feed.outputs.feed_url }}
        run: |
          set -euo pipefail

          recorded_version="$(
            python3 <<'PY'
          import json
          import os

          path = os.environ["STATE_FILE"]
          try:
              with open(path, "r", encoding="utf-8") as file:
                  state = json.load(file)
          except FileNotFoundError:
              state = {}
          print(state.get("latestVersion", ""))
          PY
          )"

          if [ "$recorded_version" = "$VERSION" ]; then
            echo "Latest version already recorded: ${VERSION}"
            exit 0
          fi

          gh label create codex-version-watch \
            --repo "$GITHUB_REPOSITORY" \
            --color "0969da" \
            --description "Issues opened by the Codex version watcher" \
            2>/dev/null || true

          title="Codex ${VERSION} available"
          existing="$(
            gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --state all \
              --search "\"${title}\" in:title" \
              --json number \
              --jq '.[0].number // ""'
          )"

          if [ -n "$existing" ]; then
            echo "Issue already exists: #${existing}"
            issue_number="$existing"
            issue_opened_at="$(gh issue view "$issue_number" --repo "$GITHUB_REPOSITORY" --json createdAt --jq .createdAt)"
          else
            body="$(mktemp)"
            cat > "$body" <<BODY
          Codex version detected from the Sparkle feed.

          | Field | Value |
          | --- | --- |
          | Version | \`${VERSION}\` |
          | Sparkle pubDate | \`${PUBLISHED_RAW}\` |
          | Published UTC | \`${PUBLISHED_AT}\` |
          | Detection UTC | \`${DETECTED_AT}\` |
          | Detection lag seconds | \`${DETECTION_LAG_SECONDS}\` |
          | Issue opened UTC | pending |
          | Feed URL | ${FEED_URL} |
          | Download URL | ${DOWNLOAD_URL} |
          | Workflow run | ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} |
          BODY

            issue_url="$(
              gh issue create \
                --repo "$GITHUB_REPOSITORY" \
                --title "$title" \
                --label codex-version-watch \
                --body-file "$body"
            )"
            issue_number="${issue_url##*/}"
            issue_opened_at="$(gh issue view "$issue_number" --repo "$GITHUB_REPOSITORY" --json createdAt --jq .createdAt)"

            cat > "$body" <<BODY
          Codex version detected from the Sparkle feed.

          | Field | Value |
          | --- | --- |
          | Version | \`${VERSION}\` |
          | Sparkle pubDate | \`${PUBLISHED_RAW}\` |
          | Published UTC | \`${PUBLISHED_AT}\` |
          | Detection UTC | \`${DETECTED_AT}\` |
          | Detection lag seconds | \`${DETECTION_LAG_SECONDS}\` |
          | Issue opened UTC | \`${issue_opened_at}\` |
          | Feed URL | ${FEED_URL} |
          | Download URL | ${DOWNLOAD_URL} |
          | Workflow run | ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} |
          BODY

            gh issue edit "$issue_number" --repo "$GITHUB_REPOSITORY" --body-file "$body"
            rm "$body"

            echo "Opened ${issue_url}"
          fi

          export issue_number issue_opened_at

          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["STATE_FILE"])
          path.parent.mkdir(parents=True, exist_ok=True)
          state = {
              "latestVersion": os.environ["VERSION"],
              "publishedRaw": os.environ["PUBLISHED_RAW"],
              "publishedAt": os.environ["PUBLISHED_AT"],
              "detectedAt": os.environ["DETECTED_AT"],
              "detectionLagSeconds": int(os.environ["DETECTION_LAG_SECONDS"]),
              "issueNumber": int(os.environ["issue_number"]),
              "issueOpenedAt": os.environ["issue_opened_at"],
              "feedUrl": os.environ["FEED_URL"],
              "downloadUrl": os.environ["DOWNLOAD_URL"],
          }
          path.write_text(json.dumps(state, indent=2) + "\n", encoding="utf-8")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$STATE_FILE"
          if git diff --cached --quiet; then
            echo "State already up to date"
          else
            git commit -m "Record Codex ${VERSION} version watch state"
            git push
          fi
