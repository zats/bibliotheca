name: Bibliotheca
options:
  bundleIdPrefix: com.zats
  defaultSourceDirectoryType: syncedFolder
  deploymentTarget:
    macOS: "26.2"
schemes:
  Bibliotheca:
    build:
      targets:
        Bibliotheca: all
    run:
      config: Debug
  BibliothecaSetup:
    build:
      targets:
        BibliothecaSetup: all
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.3
  Permiso:
    url: https://github.com/zats/permiso
    branch: main
  xxHash.swift:
    url: https://github.com/tesseract-one/xxHash.swift
    from: 0.1.0
targets:
  BibliothecaSetup:
    type: framework
    platform: macOS
    sources:
      - path: Sources
        type: syncedFolder
        excludes:
          - Bibliotheca/**
          - BibliothecaSetupCLI/**
          - BibliothecaSetup/Resources/BundledExtensions/**
          - BibliothecaSetup/Resources/BundledSkills/**
    dependencies:
      - package: xxHash.swift
        product: xxHash
    postBuildScripts:
      - name: Copy bundled setup resources
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          resources_dir="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          mkdir -p "$resources_dir"
          ditto "$SRCROOT/Sources/BibliothecaSetup/Resources/BundledExtensions" "$resources_dir/BundledExtensions"
          ditto "$SRCROOT/Sources/BibliothecaSetup/Resources/BundledSkills" "$resources_dir/BundledSkills"
    info:
      path: Generated/BibliothecaSetup-Info.plist
      properties:
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: BibliothecaSetup
        CFBundlePackageType: FMWK
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "1"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.zats.Bibliotheca.BibliothecaSetup
      SWIFT_STRICT_CONCURRENCY: complete
      SWIFT_UPCOMING_FEATURE_STRICT_CONCURRENCY: YES
  Bibliotheca:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: syncedFolder
        excludes:
          - BibliothecaSetup/**
          - BibliothecaSetupCLI/**
    dependencies:
      - target: BibliothecaSetup
      - package: Permiso
        product: Permiso
      - package: Sparkle
        product: Sparkle
    info:
      path: Generated/Bibliotheca-Info.plist
      properties:
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: Bibliotheca
        CFBundleDisplayName: Bibliotheca
        CFBundlePackageType: APPL
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.2"
        LSUIElement: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.zats.Bibliotheca
      PRODUCT_NAME: Bibliotheca
      SWIFT_STRICT_CONCURRENCY: complete
      SWIFT_UPCOMING_FEATURE_STRICT_CONCURRENCY: YES
