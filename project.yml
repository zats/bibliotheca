name: CodexExtension
options:
  bundleIdPrefix: com.zats
  defaultSourceDirectoryType: syncedFolder
  deploymentTarget:
    macOS: "26.2"
schemes:
  Codex Extension:
    build:
      targets:
        Codex Extension: all
    run:
      config: Debug
  CodexSetup:
    build:
      targets:
        CodexSetup: all
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.3
  Permiso:
    url: https://github.com/zats/permiso
    branch: main
  xxHash.swift:
    url: https://github.com/tesseract-one/xxHash.swift
    from: 0.1.0
targets:
  CodexSetup:
    type: framework
    platform: macOS
    sources:
      - path: Sources/CodexSetup
        group: Sources
        type: syncedFolder
        excludes:
          - Resources/BundledExtensions/**
          - Resources/BundledSkills/**
    dependencies:
      - package: xxHash.swift
        product: xxHash
    postBuildScripts:
      - name: Copy bundled setup resources
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          resources_dir="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          mkdir -p "$resources_dir"
          ditto "$SRCROOT/Sources/CodexSetup/Resources/BundledExtensions" "$resources_dir/BundledExtensions"
          ditto "$SRCROOT/Sources/CodexSetup/Resources/BundledSkills" "$resources_dir/BundledSkills"
    info:
      path: Generated/CodexSetup-Info.plist
      properties:
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: CodexSetup
        CFBundlePackageType: FMWK
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "1"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.zats.CodexExtension.CodexSetup
      SWIFT_STRICT_CONCURRENCY: complete
      SWIFT_UPCOMING_FEATURE_STRICT_CONCURRENCY: YES
  Codex Extension:
    type: application
    platform: macOS
    sources:
      - path: Sources/CodexExtension
        group: Sources
        type: syncedFolder
    dependencies:
      - target: CodexSetup
      - package: Permiso
        product: Permiso
      - package: Sparkle
        product: Sparkle
    info:
      path: Generated/CodexExtension-Info.plist
      properties:
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: Codex Extension
        CFBundleDisplayName: Codex Extension
        CFBundlePackageType: APPL
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.2"
        LSUIElement: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.zats.CodexExtension
      PRODUCT_NAME: Codex Extension
      SWIFT_STRICT_CONCURRENCY: complete
      SWIFT_UPCOMING_FEATURE_STRICT_CONCURRENCY: YES
